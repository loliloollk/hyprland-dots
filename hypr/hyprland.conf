# hyprland.conf by @loliloollk
monitor=eDP-1,1920x1080@60,0x0,1

$terminal = alacritty
$files    = nemo
$menu     = rofi -show drun
$browser  = librewolf
$code     = codium

# Autostart
exec-once = waybar
exec-once = swaync
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = waypaper --restore
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME, Bibata-Modern-Ice 24

general {
    gaps_in = 3
    gaps_out = 7
    border_size = 2
    col.active_border = rgb(adadad) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = yes
        size = 4
        passes = 2
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }
}

animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, popin
    animation = windowsIn, 1, 6, winIn, popin
    animation = windowsOut, 1, 5, winOut, popin
    animation = windowsMove, 1, 5, wind, popin
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind

    animation = windowsIn, 1, 6, winIn, popin 90%
    animation = windowsOut, 1, 4, winOut, popin 0%
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
     }

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Bind
$mainMod = SUPER
$subMod = $mainMod+Shift

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, L, exit,
bind = $mainMod, E, exec, $files
bind = $mainMod, Space, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, exec, pavucontrol
bind = $mainMod, J, togglesplit,
bind = $mainMod, W, exec, $browser
bind = $mainMod, C, exec, $code
bind = $mainMod, F, fullscreen
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = $mainMod, B, exec, sh ~/.config/waybar/toggle_waybar.sh
bind = $mainMod, T, exec, Telegram
bind = $mainMod, S, exec, steam
bind = $mainMod, M, exec, waypaper
bind = $mainMod, N, exec, throne
bind = $mainMod, V, exec, sh ~/.config/hypr/scripts/clipboard-manager.sh
bind = $mainMod, X, exec, sh ~/.config/hypr/scripts/powermenu.sh
bind = $mainMod, code:60, exec, sh ~/.config/hypr/scripts/rofimoji.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , F5, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Opacity & Blur
windowrule = no_blur on, match:class ^()$, match:title ^()$

# Picture In Picture
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.745) (monitor_h*0.74)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

# Floating windows
windowrule = float on, match:class ^(vlc)$
windowrule = float on, match:class ^(spotify)$
windowrule = float on, match:class ^(Throne)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^($browser)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^($browser)$, match:title ^(Library)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:class ^(org.kde.ark)$
windowrule = float on, center on, size (monitor_w*0.67) (monitor_h*0.70), match:class ^(nemo)
windowrule = float on, center on, size (monitor_w*0.70) (monitor_h*0.78), match:class ^(com.interversehq.qView)$
windowrule = float on, size (monitor_w*0.48) (monitor_h*0.42), match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, center on, size (monitor_w*0.50) (monitor_h*0.55), match:class ^(nwg-look)$
windowrule = float on, center on, size (monitor_w*0.50) (monitor_h*0.55), match:class ^(waypaper)$
windowrule = float on, center on, size (monitor_w*0.68) (monitor_h*0.74), match:class ^(steam)$
windowrule = float on, center on, size (monitor_w*0.70) (monitor_h*0.75), match:class ^(org.telegram.desktop)$
windowrule = float on, center on, size (monitor_w*0.67) (monitor_h*0.80), match:class ^(com.obsproject.Studio)$
windowrule = float on, center on, size (monitor_w*0.63) (monitor_h*0.74), match:class ^(org.gnome.Loupe)$
windowrule = float on, center on, size (monitor_w*0.45) (monitor_h*0.55), match:class ^(qalculate-gtk)$

# modals
windowrule = float on, match:title ^(Open)$
windowrule = float on, match:title ^(Authentication Required)$
windowrule = float on, match:title ^(Add Folder to Workspace)$
windowrule = float on, match:initial_title ^(Open File)$
windowrule = float on, match:title ^(Choose Files)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Confirm to replace files)$
windowrule = float on, match:title ^(File Operation Progress)$
windowrule = float on, match:title ^(File Upload)(.*)$
windowrule = float on, match:title ^(Choose wallpaper)(.*)$
windowrule = float on, match:title ^(Library)(.*)$
windowrule = float on, match:class ^(.*dialog.*)$
windowrule = float on, match:title ^(.*dialog.*)$

# hyprland portal
windowrule = float on, center on, match:class ^(org.freedesktop.impl.portal.desktop.hyprland)$

# gtk portal
windowrule = float on, center on, match:class ^(org.freedesktop.impl.portal.desktop.gtk)$

# xdg-desktop-portal-gtk
windowrule = float on, center on, match:class ^([Xx]dg-desktop-portal-gtk)$

# Layer rules
layerrule = blur on, ignore_alpha 0, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur true, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur true, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur true, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on, ignore_alpha 0, match:namespace waybar
